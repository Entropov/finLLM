# ============================================================
# Fin-Instruct LoRA 权重合并配置
# 将训练好的 LoRA adapter 合并到基座模型中，生成完整模型
# ============================================================

# ==================== 模型配置 ====================
model_name_or_path: Qwen/Qwen2.5-7B-Instruct
adapter_name_or_path: saves/qwen2.5-7b/lora/sft/checkpoint-2000   # LoRA adapter 路径
trust_remote_code: true

# ==================== 微调方法 ====================
finetuning_type: lora
template: qwen

# ==================== 合并与导出 ====================
export_dir: saves/qwen2.5-7b/merged                # 合并后的完整模型输出目录
export_size: 4                                      # 每个分片文件最大 4GB
export_device: cpu                                  # 在 CPU 上执行合并（节省显存）
export_legacy_format: false                         # 使用 safetensors 格式（推荐）
